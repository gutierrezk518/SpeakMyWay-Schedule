<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fish Body -->
  <path d="M 100,200 Q 150,150 250,180 T 300,200 Q 250,220 150,250 T 100,200 Z" 
    fill="white" stroke="black" stroke-width="3" class="colorable" data-name="body" />
  
  <!-- Tail -->
  <path d="M 300,200 L 350,150 L 350,250 Z" 
    fill="white" stroke="black" stroke-width="2" class="colorable" data-name="tail" />
  
  <!-- Eye -->
  <circle cx="150" cy="190" r="15" fill="white" stroke="black" stroke-width="2" class="colorable" data-name="eyeOuter" />
  <circle cx="150" cy="190" r="7" fill="black" class="colorable" data-name="eyeInner" />
  
  <!-- Fins -->
  <path d="M 180,150 Q 200,120 220,130 T 210,150" 
    fill="white" stroke="black" stroke-width="2" class="colorable" data-name="topFin" />
  
  <path d="M 180,250 Q 200,280 220,270 T 210,250" 
    fill="white" stroke="black" stroke-width="2" class="colorable" data-name="bottomFin" />
  
  <!-- Gills -->
  <path d="M 170,180 Q 180,190 170,200" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="gill" />
  
  <!-- Scales -->
  <path d="M 200,180 Q 210,170 220,180" 
    fill="none" stroke="black" stroke-width="1.5" class="colorable" data-name="scale1" />
  
  <path d="M 230,180 Q 240,170 250,180" 
    fill="none" stroke="black" stroke-width="1.5" class="colorable" data-name="scale2" />
  
  <path d="M 200,210 Q 210,200 220,210" 
    fill="none" stroke="black" stroke-width="1.5" class="colorable" data-name="scale3" />
  
  <path d="M 230,210 Q 240,200 250,210" 
    fill="none" stroke="black" stroke-width="1.5" class="colorable" data-name="scale4" />
  
  <!-- Bubbles -->
  <circle cx="80" cy="170" r="5" fill="white" stroke="black" stroke-width="1" class="colorable" data-name="bubble1" />
  <circle cx="70" cy="190" r="8" fill="white" stroke="black" stroke-width="1" class="colorable" data-name="bubble2" />
  <circle cx="60" cy="210" r="4" fill="white" stroke="black" stroke-width="1" class="colorable" data-name="bubble3" />
  
  <!-- Water Plants -->
  <path d="M 340,300 Q 350,280 360,290 T 370,270 Q 380,280 390,260" 
    fill="none" stroke="black" stroke-width="1.5" class="colorable" data-name="plant1" />
  
  <path d="M 50,310 Q 60,290 70,300 T 80,280 Q 90,290 100,270" 
    fill="none" stroke="black" stroke-width="1.5" class="colorable" data-name="plant2" />
</svg>