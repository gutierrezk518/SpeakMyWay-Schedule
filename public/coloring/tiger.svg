<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Tiger Head -->
  <circle cx="200" cy="160" r="80" fill="white" stroke="black" stroke-width="3" class="colorable" data-name="head" />
  
  <!-- Ears -->
  <path d="M 140,110 Q 130,90 140,70 T 160,90" 
    fill="white" stroke="black" stroke-width="2" class="colorable" data-name="leftEar" />
  
  <path d="M 260,110 Q 270,90 260,70 T 240,90" 
    fill="white" stroke="black" stroke-width="2" class="colorable" data-name="rightEar" />
  
  <!-- Eyes -->
  <circle cx="170" cy="140" r="12" fill="white" stroke="black" stroke-width="2" class="colorable" data-name="leftEyeOuter" />
  <circle cx="170" cy="140" r="6" fill="black" class="colorable" data-name="leftEyeInner" />
  
  <circle cx="230" cy="140" r="12" fill="white" stroke="black" stroke-width="2" class="colorable" data-name="rightEyeOuter" />
  <circle cx="230" cy="140" r="6" fill="black" class="colorable" data-name="rightEyeInner" />
  
  <!-- Nose -->
  <path d="M 190,170 Q 200,180 210,170 T 200,180 Q 190,170 200,165 Z" 
    fill="pink" stroke="black" stroke-width="1.5" class="colorable" data-name="nose" />
  
  <!-- Mouth -->
  <path d="M 180,190 Q 200,200 220,190" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="mouth" />
  
  <!-- Whiskers -->
  <line x1="180" y1="180" x2="140" y2="175" stroke="black" stroke-width="1.5" class="colorable" data-name="whisker1" />
  <line x1="180" y1="185" x2="140" y2="185" stroke="black" stroke-width="1.5" class="colorable" data-name="whisker2" />
  <line x1="180" y1="190" x2="140" y2="195" stroke="black" stroke-width="1.5" class="colorable" data-name="whisker3" />
  
  <line x1="220" y1="180" x2="260" y2="175" stroke="black" stroke-width="1.5" class="colorable" data-name="whisker4" />
  <line x1="220" y1="185" x2="260" y2="185" stroke="black" stroke-width="1.5" class="colorable" data-name="whisker5" />
  <line x1="220" y1="190" x2="260" y2="195" stroke="black" stroke-width="1.5" class="colorable" data-name="whisker6" />
  
  <!-- Body -->
  <path d="M 160,220 Q 180,240 200,250 T 240,220 Q 260,250 250,280 T 200,330 Q 150,310 150,280 T 160,220 Z" 
    fill="white" stroke="black" stroke-width="3" class="colorable" data-name="body" />
  
  <!-- Legs -->
  <path d="M 160,280 L 140,340" 
    fill="none" stroke="black" stroke-width="3" class="colorable" data-name="frontLeg1" />
  
  <path d="M 240,280 L 260,340" 
    fill="none" stroke="black" stroke-width="3" class="colorable" data-name="frontLeg2" />
  
  <!-- Stripes -->
  <path d="M 180,120 Q 190,110 200,120" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe1" />
  
  <path d="M 210,125 Q 220,115 230,125" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe2" />
  
  <path d="M 170,170 Q 180,160 190,170" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe3" />
  
  <path d="M 210,170 Q 220,160 230,170" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe4" />
  
  <path d="M 180,240 Q 190,230 200,240" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe5" />
  
  <path d="M 210,245 Q 220,235 230,245" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe6" />
  
  <path d="M 180,270 Q 190,260 200,270" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe7" />
  
  <path d="M 210,270 Q 220,260 230,270" 
    fill="none" stroke="black" stroke-width="2" class="colorable" data-name="stripe8" />
  
  <!-- Tail -->
  <path d="M 200,330 Q 210,350 220,370 T 230,320" 
    fill="white" stroke="black" stroke-width="2" class="colorable" data-name="tail" />
</svg>